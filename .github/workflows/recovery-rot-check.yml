name: recovery-rot-check

on:
  schedule:
    # Weekly, Monday 13:00 UTC — recovery candidates rot slower than canonical
    # sources, so this runs less often than the daily link-check.
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Plan alerts without opening/closing issues"
        type: boolean
        default: false

# Needed so the alert step can open, update, and close issues.
permissions:
  contents: read
  issues: write

jobs:
  check-recovery-rot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Detect headless mode
        id: cfg
        # Single source of truth: check_recovery_rot.py reads reachability.headless
        # too (via check_links.py), so we only decide here whether to install the browser.
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib, yaml
          cfg = yaml.safe_load(pathlib.Path("almanac.config.yml").read_text()) or {}
          on = bool((cfg.get("reachability") or {}).get("headless", False))
          print("headless=" + ("true" if on else "false"))
          PY
      - name: Install headless browser
        if: steps.cfg.outputs.headless == 'true'
        run: |
          pip install -r requirements-headless.txt
          playwright install --with-deps chromium
      - name: Probe recovery[] candidate URLs
        # check_recovery_rot.py exits non-zero when a candidate has rotted; tee
        # keeps the step green so the alert step below always runs on the report.
        run: python scripts/check_recovery_rot.py --json | tee recovery-rot-report.json
      - name: Open or refresh recovery-rot alerts
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/alert_on_recovery_rot.py \
            --report recovery-rot-report.json \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recovery-rot-report
          path: recovery-rot-report.json
